<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Y2K Chrome Type Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Black+Ops+One&family=Bungee+Shade&family=Creepster&family=Ewert&family=Faster+One&family=Frijole&family=Jacquard+12&family=Libre+Barcode+128+Text&family=MedievalSharp&family=Metal+Mania&family=Monoton&family=New+Rocker&family=Pirata+One&family=Press+Start+2P&family=Rye&family=Rubik+Glitch&family=Rubik+Iso&family=Rubik+Moonrocks&family=Sancreek&family=Silkscreen:wght@400;700&family=Trade+Winds&family=UnifrakturCook:wght@700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">browser toy / merch machine / bad idea factory</p>
      <h1>Y2K Chrome Type Generator</h1>
      <p>Rotating extruded gothic/Y2K text. Browser-only. Optimized Canvas render. Export PNG, WebM, or GIF.</p>
    </header>

    <section class="app">
      <aside class="panel" aria-label="Controls">
        <label>
          Text
          <textarea id="textInput" rows="2">Y2K CHROME</textarea>
        </label>

        <div class="grid two">
          <label>
            Font
            <select id="fontSelect"></select>
          </label>
          <label>
            Preset
            <select id="presetSelect">
              <option value="chrome">Y2K chrome</option>
              <option value="gothic">Gothic ice</option>
              <option value="blood">Blood chrome</option>
              <option value="toxic">Toxic terminal</option>
              <option value="inferno">Inferno</option>
              <option value="bubblegum">Bubblegum evil</option>
              <option value="void">Void static</option>
              <option value="acid">Acid merch</option>
            </select>
          </label>
        </div>

        <div class="grid two">
          <label>Face <input id="faceColor" type="color" value="#ffffff"></label>
          <label>Extrude <input id="extrudeColor" type="color" value="#aeb7c7"></label>
          <label>Stroke <input id="strokeColor" type="color" value="#000000"></label>
          <label>Background <input id="bgColor" type="color" value="#050505"></label>
        </div>

        <div class="grid two">
          <label>Font size <input id="fontSize" type="range" min="32" max="230" value="118"></label>
          <label>Depth <input id="depth" type="range" min="0" max="180" value="92"></label>
          <label>Tail angle <input id="angle" type="range" min="0" max="360" value="220"></label>
          <label>Tail spread <input id="tailSpread" type="range" min="20" max="220" value="100"></label>
          <label>Perspective <input id="perspective" type="range" min="0" max="100" value="38"></label>
          <label>Stroke <input id="strokeWidth" type="range" min="0" max="18" value="4"></label>
          <label>Spacing <input id="letterSpacing" type="range" min="-10" max="22" value="0"></label>
          <label>Tilt <input id="tilt" type="range" min="-45" max="45" value="0"></label>
          <label>Spin speed <input id="speed" type="range" min="0" max="100" value="34"></label>
          <label>Blur tail <input id="blur" type="range" min="0" max="14" value="1"></label>
          <label>Render quality <input id="quality" type="range" min="12" max="80" value="42"></label>
        </div>

        <div class="grid two">
          <label>Glitch slices <input id="glitch" type="range" min="0" max="100" value="22"></label>
          <label>RGB split <input id="rgbSplit" type="range" min="0" max="100" value="18"></label>
          <label>Noise <input id="noise" type="range" min="0" max="100" value="22"></label>
          <label>Scanlines <input id="scanlines" type="range" min="0" max="100" value="18"></label>
        </div>

        <div class="grid two checkgrid">
          <label><input id="transparent" type="checkbox"> Transparent PNG</label>
          <label><input id="pixelSnap" type="checkbox" checked> Pixel snap</label>
          <label><input id="shadow" type="checkbox" checked> Drop shadow</label>
          <label><input id="centerGuide" type="checkbox"> Center guide</label>
        </div>

        <div class="buttons">
          <button id="randomizeBtn" type="button">Randomize</button>
          <button id="pngBtn" type="button">Save PNG</button>
          <button id="webmBtn" type="button">Record WebM</button>
          <button id="gifBtn" type="button">Export GIF</button>
        </div>
        <p class="hint">This version uses stable fake-3D projection: the tail no longer orbits independently from the face.</p>
      </aside>

      <section class="stage-wrap">
        <canvas id="stage" width="1200" height="675"></canvas>
      </section>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
